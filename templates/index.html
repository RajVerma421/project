<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>T-29 AI Script Generator</title>
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

    <div class="container">

        <div class="card">
            <h1>🎬 AI Influencer</h1>

            <form id="scriptForm" action="/generate_script" method="POST">

                <div class="input-group">
                    <label>Topic</label>
                    <input type="text" name="topic" placeholder="Enter topic..." required>
                </div>

                <div class="input-group">
                    <label>Content Type</label>
                    <select name="type">
                        <option value="Reel">Reel</option>
                        <option value="Instagram Post">Instagram Post</option>
                        <option value="YouTube Short">YouTube Short</option>
                        <option value="Advertisement">Advertisement</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Emotion</label>
                    <select name="emotion">
                        <option value="Excited">Excited</option>
                        <option value="Motivational">Motivational</option>
                        <option value="Funny">Funny</option>
                        <option value="Serious">Serious</option>
                    </select>
                </div>

                <button type="submit" class="btn">Generate</button>

            </form>

            <div id="loader" class="loader hidden"></div>

            {% if script %}
            <div class="output-card">
                <h3>✨ Generated Script</h3>
                <p>{{ script }}</p>
            </div class="output-card">
            {% endif %}
            {% if video_file %}
            <h3>Generated Video:</h3>
            <video width="200" controls>
                <source src="{{ url_for('serve_video', filename=video_file) }}" type="video/mp4">
            </video>
            {% endif %}
        </div>

    </div>

    <script src="../static/script.js"></script>
</body>

</html>
